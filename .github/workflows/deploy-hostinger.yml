name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_SUPABASE_URL: ${{ secrets.PROD_VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.PROD_VITE_SUPABASE_PROJECT_ID }}
      SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Swap Vite config for Node target
        run: cp hostinger/vite.config.node.ts vite.config.ts

      - name: Build production bundle
        run: bun run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy
          cp -R dist deploy/dist
          cp hostinger/server.mjs deploy/server.mjs
          cp package-lock.json deploy/package-lock.json
          cp .env.example deploy/.env.example
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const extra = JSON.parse(
            fs.readFileSync("hostinger/package.scripts.json", "utf8"),
          );

          pkg.scripts = {
            ...pkg.scripts,
            ...extra.scripts,
          };

          fs.writeFileSync(
            "deploy/package.json",
            `${JSON.stringify(pkg, null, 2)}\n`,
          );
          NODE

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: hostinger-deploy-package
          path: deploy

      - name: Resolve deploy flags
        id: flags
        run: |
          echo "has_ftp=${{ secrets.HOSTINGER_FTP_SERVER != '' }}" >> "$GITHUB_OUTPUT"
          echo "has_ssh=${{ secrets.HOSTINGER_SSH_HOST != '' }}" >> "$GITHUB_OUTPUT"

      - name: Deploy files over FTP
        if: steps.flags.outputs.has_ftp == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: ${{ secrets.HOSTINGER_FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Install production dependencies over SSH
        if: steps.flags.outputs.has_ssh == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || '22' }}
          script: |
            set -eu
            cd "${{ secrets.HOSTINGER_APP_DIR }}"
            npm install --omit=dev
            if [ -n "${{ secrets.HOSTINGER_RESTART_COMMAND }}" ]; then
              eval "${{ secrets.HOSTINGER_RESTART_COMMAND }}"
            fi
